# ─────────────────────────────────────────────────────────────
# Service — exposes the deployment inside the cluster
# The Ingress (Member 3) will route external traffic to this.
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: app-migration-service
  namespace: default
  labels:
    app: app-migration
spec:
  selector:
    app: app-migration
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP